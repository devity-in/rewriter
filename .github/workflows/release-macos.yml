# Builds the macOS app, creates a DMG, and uploads it to a GitHub Release.
# Trigger: push a tag matching v* (e.g. git tag v1.0.0 && git push origin v1.0.0)
name: Release macOS (DMG)

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Download model asset
        run: gh release download model-assets --pattern 'model.gguf' --dir assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/rewriter.app"
          DMG_NAME="Rewriter-${GITHUB_REF_NAME}.dmg"
          VOLUME_NAME="Rewriter"
          # Create a staging folder so the DMG shows a single app
          mkdir -p dmg_stage
          cp -R "$APP_PATH" dmg_stage/
          hdiutil create -volname "$VOLUME_NAME" -srcfolder dmg_stage -ov -format UDZO "$DMG_NAME"
          echo "DMG_PATH=$DMG_NAME" >> $GITHUB_ENV

      - name: Create Release and upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
